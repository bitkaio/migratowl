  <text x="172" y="447" font-size="11" fill="#f85149">breaking</text>

  <text x="54"  y="465" font-size="11"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        fill="#cdd9e5">PydanticUserError: @validator is no longer supported, use @field_validator</text>

  <rect x="54"  y="474" width="752" height="30" rx="3" fill="#120606" stroke="#3d1a1a" stroke-width="1"/>
  <text x="62"  y="494" font-size="11" font-style="italic" fill="#8b949e">"v2.0 — @validator replaced by @field_validator with updated signature."</text>

  <text x="54"  y="522" font-size="11" fill="#8b949e">Fix: migrate validators to</text>
  <rect x="216" y="508" width="114" height="16" rx="3" fill="#2d1010"/>
  <text x="221" y="520" font-size="11"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        fill="#ffa198">@field_validator</text>
  <text x="334" y="522" font-size="11" fill="#8b949e"> — see Pydantic v2 migration guide.</text>

