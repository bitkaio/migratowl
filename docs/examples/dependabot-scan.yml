# docs/examples/dependabot-scan.yml
#
# Drop this file into .github/workflows/ in any repo you want Migratowl to scan.
#
# Requirements:
#   - Set MIGRATOWL_URL as a repository Actions variable
#     (Settings → Secrets and variables → Actions → Variables)
#     e.g. https://migratowl.internal.yourcompany.com
#   - Migratowl must be configured with a GitHub token that has:
#       repo:status  — to set commit statuses
#       public_repo  — to post PR comments (or full "repo" for private repos)
#
# For GitHub Enterprise Server:
#   - Set MIGRATOWL_URL to point at your Migratowl instance
#   - Set GITHUB_API_URL in Migratowl's .env to your GHES API URL
#     e.g. GITHUB_API_URL=https://github.corp.com/api/v3
#
# For GitLab (self-hosted or gitlab.com):
#   - Change git_provider to "gitlab"
#   - Set GITLAB_TOKEN and GITLAB_API_URL in Migratowl's .env

name: Migratowl Dependency Scan

on:
  pull_request:
    types: [opened, synchronize]

# Minimal permissions — Migratowl uses its own token to post comments and statuses.
permissions:
  contents: read

jobs:
  migratowl-scan:
    # Only run for Dependabot PRs. Remove this condition to scan all PRs.
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Migratowl scan
        env:
          MIGRATOWL_URL: ${{ vars.MIGRATOWL_URL }}
          REPO_URL: ${{ github.event.repository.clone_url }}
          BRANCH_NAME: ${{ github.head_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Extract the single dependency name from "Bump <name> from X to Y".
          # Grouped Dependabot PRs ("Bump the npm group with N updates") won't match,
          # so DEP_NAME will be empty and check_deps falls back to [] (scan everything).
          DEP_NAME=$(echo "$PR_TITLE" | sed -n 's/^Bump \([^ ]*\) from .*/\1/p')
          if [ -n "$DEP_NAME" ]; then
            CHECK_DEPS=$(jq -n --arg dep "$DEP_NAME" '[$dep]')
          else
            CHECK_DEPS='[]'
          fi

          payload=$(jq -n \
            --arg     repo_url     "$REPO_URL" \
            --arg     branch_name  "$BRANCH_NAME" \
            --arg     commit_sha   "$COMMIT_SHA" \
            --argjson pr_number    "$PR_NUMBER" \
            --argjson check_deps   "$CHECK_DEPS" \
            '{
              repo_url:     $repo_url,
              branch_name:  $branch_name,
              git_provider: "github",
              pr_number:    $pr_number,
              commit_sha:   $commit_sha,
              check_deps:   $check_deps
            }')
          curl --fail-with-body -X POST "$MIGRATOWL_URL/webhook" \
            -H "Content-Type: application/json" \
            -d "$payload"
