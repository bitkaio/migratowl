name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Run tests before releasing ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # zizmor: ignore[cache-poisoning] -- enable-caching: false set below
        with:
          enable-caching: false

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Test
        run: uv run pytest tests/ -v

  # ── Build and push Docker image with LangGraph CLI ─────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      primary_tag: ${{ steps.primary.outputs.primary_tag }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # zizmor: ignore[cache-poisoning] -- enable-caching: false set below
        with:
          enable-caching: false

      - name: Install dependencies (includes langgraph-cli)
        run: uv sync --frozen --group dev

      - name: Build image with LangGraph CLI
        id: primary
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          PRIMARY_TAG=$(echo "$DOCKER_TAGS" | head -1)
          uv run langgraph build \
            --platform linux/amd64 \
            -t "${PRIMARY_TAG}"
          echo "primary_tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"

      - name: Tag and push all image tags
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          PRIMARY_TAG=$(echo "$DOCKER_TAGS" | head -1)
          while IFS= read -r TAG; do
            if [[ "$TAG" != "$PRIMARY_TAG" ]]; then
              docker tag "$PRIMARY_TAG" "$TAG"
            fi
            docker push "$TAG"
          done <<< "$DOCKER_TAGS"

      - name: Get image digest
        id: digest
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          PRIMARY_TAG=$(echo "$DOCKER_TAGS" | head -1)
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$PRIMARY_TAG" \
            | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

  # ── Sign, attest, SBOM ──────────────────────────────────────────────────────
  sign-and-attest:
    name: Sign & Attest
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      IMAGE_REF: ghcr.io/${{ github.repository }}@${{ needs.docker.outputs.digest }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image (keyless via OIDC)
        run: cosign sign --yes "$IMAGE_REF"

      - name: Install syft CLI
        run: |
          SYFT_VERSION="1.25.0"
          curl -sSfL "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin syft

      - name: Generate and attach SBOM
        run: |
          syft "$IMAGE_REF" -o cyclonedx-json > sbom.cdx.json
          cosign attest --yes --predicate sbom.cdx.json --type cyclonedx "$IMAGE_REF"

      - name: Install Trivy CLI
        run: |
          TRIVY_VERSION="0.69.3"
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /usr/local/bin trivy

      - name: Scan released image with Trivy
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --format json \
            -o trivy-release-report.json \
            "$IMAGE_REF" || true

      - name: Upload SBOM as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom-${{ github.ref_name }}
          path: sbom.cdx.json

      - name: Upload Trivy scan report as artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: trivy-scan-${{ github.ref_name }}
          path: trivy-release-report.json

  # ── SLSA provenance ─────────────────────────────────────────────────────────
  provenance:
    name: SLSA Provenance
    needs: docker
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a
    with:
      image: ghcr.io/${{ github.repository }}
      digest: ${{ needs.docker.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [sign-and-attest, provenance, docker]
    permissions:
      contents: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: "*-${{ github.ref_name }}"
          merge-multiple: true

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        env:
          IMAGE_DIGEST: ${{ needs.docker.outputs.digest }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > changelog.md

          if [ ! -s changelog.md ]; then
            echo "⚠️  No CHANGELOG.md entry for ${VERSION}, falling back to git log"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..HEAD"
            else
              RANGE="HEAD"
            fi
            {
              echo "### Changes"
              echo ""
              git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges
            } > changelog.md
          fi

          {
            echo ""
            echo "---"
            echo ""
            echo "### Docker Image"
            echo ""
            echo '```'
            echo "docker pull ${IMAGE}:${VERSION}"
            echo '```'
            echo ""
            echo "Immutable digest (recommended for production):"
            echo ""
            echo '```'
            echo "docker pull ${IMAGE}@${IMAGE_DIGEST}"
            echo '```'
          } >> changelog.md

          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          name: "Release ${{ github.ref_name }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            sbom.cdx.json
            trivy-release-report.json
