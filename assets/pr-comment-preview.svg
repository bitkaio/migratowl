  <text x="235" y="188" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#8b949e">2.28.0</text>
  <text x="430" y="188" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="600" fill="#3fb950">3.0.0</text>
