  <text x="235" y="252" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#8b949e">0.95.0</text>
  <text x="430" y="252" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="600" fill="#3fb950">0.115.0</text>
  <text x="625" y="252" font-size="12" font-weight="600" fill="#3fb950" text-anchor="start">✓ safe</text>
  <line x1="40" y1="264" x2="820" y2="264" stroke="#21262d" stroke-width="1"/>

  <!-- row: httpx (safe) -->
  <text x="40"  y="284" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#e6edf3">httpx</text>
  <text x="235" y="284" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#8b949e">0.24.0</text>
  <text x="430" y="284" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="600" fill="#3fb950">0.28.0</text>
  <text x="625" y="284" font-size="12" font-weight="600" fill="#3fb950" text-anchor="start">✓ safe</text>

