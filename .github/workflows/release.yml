name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create GitHub Release
  packages: write   # push to GHCR
  id-token: write   # OIDC (future cosign image signing)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  # ── Run tests before releasing ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-caching: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Test
        run: uv run pytest tests/ -v

  # ── Build and push Docker image with LangGraph CLI ─────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: test
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Full semver tag:  v1.2.3  →  1.2.3
            type=semver,pattern={{version}}
            # Minor tag:        v1.2.3  →  1.2
            type=semver,pattern={{major}}.{{minor}}
            # Major tag:        v1.2.3  →  1
            type=semver,pattern={{major}}
            # latest on every release tag
            type=raw,value=latest

      # langgraph build reads langgraph.json at the repo root.
      # Single-arch linux/amd64: docker load (used internally by langgraph build)
      # rejects multi-arch OCI manifest lists.
      # The primary tag is the full semver (first tag output by metadata-action).
      - name: Install LangGraph CLI
        run: pip install "langgraph-cli[inmem]"

      - name: Build image with LangGraph CLI
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          PRIMARY_TAG=$(echo "$DOCKER_TAGS" | head -1)
          langgraph build \
            --platform linux/amd64 \
            -t "${PRIMARY_TAG}"

      # Tag the locally-built image with all metadata-action tags, then push them all.
      - name: Tag and push all image tags
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          PRIMARY_TAG=$(echo "$DOCKER_TAGS" | head -1)
          while IFS= read -r TAG; do
            if [[ "$TAG" != "$PRIMARY_TAG" ]]; then
              docker tag "$PRIMARY_TAG" "$TAG"
            fi
            docker push "$TAG"
          done <<< "$DOCKER_TAGS"

      - name: Get image digest
        id: digest
        env:
          DOCKER_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          PRIMARY_TAG=$(echo "$DOCKER_TAGS" | head -1)
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$PRIMARY_TAG" \
            | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history needed to generate changelog

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        env:
          IMAGE_DIGEST: ${{ needs.docker.outputs.digest }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          # Extract the section for this version from CHANGELOG.md
          # Matches from "## [X.Y.Z]" to the next "## [" or end of file
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > changelog.md

          # Fall back to git log if CHANGELOG.md has no entry for this version
          if [ ! -s changelog.md ]; then
            echo "⚠️  No CHANGELOG.md entry for ${VERSION}, falling back to git log"
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              RANGE="${PREV_TAG}..HEAD"
            else
              RANGE="HEAD"
            fi
            {
              echo "### Changes"
              echo ""
              git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges
            } > changelog.md
          fi

          # Append Docker pull instructions (no binary files to attach)
          {
            echo ""
            echo "---"
            echo ""
            echo "### Docker Image"
            echo ""
            echo '```'
            echo "docker pull ${IMAGE}:${VERSION}"
            echo '```'
            echo ""
            echo "Immutable digest (recommended for production):"
            echo ""
            echo '```'
            echo "docker pull ${IMAGE}@${IMAGE_DIGEST}"
            echo '```'
          } >> changelog.md

          cat changelog.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          body_path: changelog.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
