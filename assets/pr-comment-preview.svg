  <text x="235" y="220" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#8b949e">1.10.0</text>
  <text x="430" y="220" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="600" fill="#3fb950">2.7.0</text>
  <text x="625" y="220" font-size="12" font-weight="600" fill="#f85149" text-anchor="start">✗ breaking</text>
  <line x1="40" y1="232" x2="820" y2="232" stroke="#21262d" stroke-width="1"/>

