  <text x="40"  y="156" font-size="12" font-weight="600" fill="#8b949e">Package</text>
  <text x="235" y="156" font-size="12" font-weight="600" fill="#8b949e">Current</text>
  <text x="430" y="156" font-size="12" font-weight="600" fill="#8b949e">Latest</text>
  <text x="625" y="156" font-size="12" font-weight="600" fill="#8b949e" text-anchor="start">Breaking</text>
  <line x1="40" y1="168" x2="820" y2="168" stroke="#21262d" stroke-width="1"/>

