  <text x="127" y="396" font-size="11"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        fill="#ffa198">from requests import PreparedRequest</text>
  <text x="374" y="398" font-size="11" fill="#8b949e">with</text>
  <rect x="400" y="384" width="213" height="16" rx="3" fill="#2d1010"/>
  <text x="405" y="396" font-size="11"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        fill="#ffa198">requests.models.PreparedRequest</text>

  <!-- ══ BREAKING DETAIL: pydantic ══ -->
  <rect x="40"  y="430" width="780" height="116" rx="4" fill="#1a0a0a" stroke="#3d1a1a" stroke-width="1"/>
  <rect x="40"  y="430" width="3"   height="116" rx="1" fill="#f85149"/>

  <text x="54"  y="447" font-size="13" font-weight="bold"
