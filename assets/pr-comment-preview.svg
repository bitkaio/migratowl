  <text x="74" y="53" font-size="13" font-weight="bold" fill="#e6edf3">migratowl-bot</text>
  <text x="182" y="53" font-size="12" fill="#8b949e">commented on this pull request</text>
  <rect x="779" y="35" width="41" height="18" rx="9" fill="#238636"/>
  <text x="800" y="48" text-anchor="middle" font-size="10" font-weight="bold" fill="white">bot</text>

  <!-- header / body separator -->
  <line x1="24" y1="72" x2="836" y2="72" stroke="#21262d" stroke-width="1"/>

