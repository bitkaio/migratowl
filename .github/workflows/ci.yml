name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:

  # ── Lint and test ────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-caching: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Ruff lint
        run: uv run ruff check migratowl/

      - name: Mypy type check
        run: uv run mypy migratowl/ --ignore-missing-imports

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=migratowl --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Security scanning ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python (for tool installs)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"

      - name: Install Semgrep
        run: pip install "semgrep==1.136.0"

      - name: Run Semgrep
        run: |
          # semgrep's opentelemetry deps use pkg_resources (removed in Python 3.13 stdlib).
          # Re-install setuptools *after* semgrep so pip can't downgrade it away.
          pip install --quiet setuptools
          semgrep scan \
            --config p/python \
            --config p/security-audit \
            --config p/owasp-top-ten \
            --config p/docker \
            --severity ERROR \
            --error \
            .

      - name: Lint runtime Dockerfile with Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3
        with:
          dockerfile: k8s/runtime/Dockerfile
          failure-threshold: error

      - name: Lint sandbox-router Dockerfile with Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3
        with:
          dockerfile: k8s/sandbox-router/Dockerfile
          failure-threshold: error

  # ── Workflow static analysis (zizmor) ────────────────────────────────────
  workflow-security:
    name: Workflow Security (zizmor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Python (for zizmor)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"

      - name: Install zizmor
        run: pip install "zizmor==1.16.3"

      - name: Run zizmor (SARIF output for Security tab)
        run: zizmor --format sarif .github/workflows/ > zizmor.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3
        with:
          sarif_file: zizmor.sarif

      - name: Run zizmor (text — fail on HIGH)
        run: |
          set +e
          zizmor --format plain --min-severity high .github/workflows/
          EXIT_CODE=$?
          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "::error::zizmor found HIGH or CRITICAL issues in workflow files"
            exit 1
          fi

  # ── Dependency review (PR only) ──────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4
        with:
          fail-on-severity: high

  # ── Conventional commits (PR only) ───────────────────────────────────────
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Validate commit messages
        uses: webiny/action-conventional-commits@faccb24fc2550dd15c0390d944379d2d8ed9690e  # v1
        with:
          allowed-commit-types: "feat,fix,chore,docs,refactor,test,ci,build,perf,style,revert"

  # ── License headers (PR only) ────────────────────────────────────────────
  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Check license headers
        uses: apache/skywalking-eyes@61275cc80d0798a405cb070f7d3a8aaf7cf2c2c1  # v0.8.0
        with:
          mode: check

  # ── Markdown lint (PR only) ──────────────────────────────────────────────
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"

      - name: Install markdownlint-cli2
        run: npm install -g "markdownlint-cli2@0.17.2"

      - name: Lint Markdown files
        run: markdownlint-cli2 "**/*.md" "#node_modules" "#.venv"

  # CodeQL is handled by GitHub's Default Setup (repo Settings → Code Security).
  # A custom advanced-config job cannot coexist with Default Setup without conflict.

  # ── Dependency vulnerability scan (push to main only) ────────────────────
  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-caching: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install "pip-audit==2.9.0"

      - name: Run pip-audit against lockfile
        run: |
          uv export --frozen --no-dev --format requirements-txt > /tmp/reqs.txt
          pip-audit --requirement /tmp/reqs.txt --strict

      - name: Run Bandit (warning-only)
        run: uv run bandit -r migratowl/ || true

  # ── Container scan (push to main only) ──────────────────────────────────
  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read

    env:
      IMAGE_NAME: migratowl-ci-scan

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df  # v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          enable-caching: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (includes langgraph-cli)
        run: uv sync --frozen --group dev

      - name: Build image with LangGraph CLI
        run: uv run langgraph build --platform linux/amd64 -t "$IMAGE_NAME"

      - name: Install Trivy CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TRIVY_VERSION=$(gh api repos/aquasecurity/trivy/releases/latest --jq '.tag_name[1:]')
          curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C /usr/local/bin trivy
          trivy --version

      - name: Scan image with Trivy
        run: |
          trivy image \
            --exit-code 1 \
            --severity HIGH,CRITICAL \
            --format json \
            -o trivy-report.json \
            "$IMAGE_NAME"

      - name: Install syft CLI
        run: |
          SYFT_VERSION="1.25.0"
          curl -sSfL "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz" \
            | tar -xz -C /usr/local/bin syft
          syft --version

      - name: Generate SBOM
        run: syft "$IMAGE_NAME" -o cyclonedx-json > sbom.cdx.json

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 30

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30
